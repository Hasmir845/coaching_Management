version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: coaching_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongodb_data:/data/db
    networks:
      - coaching_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coaching_backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:admin@mongodb:27017/coaching_management
      PORT: 5000
      NODE_ENV: development
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - coaching_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coaching_frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - coaching_network

volumes:
  mongodb_data:

networks:
  coaching_network:
    driver: bridge
