[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Set in Netlify UI (required for production data):
  # VITE_API_URL = https://coaching-management-ubiu.vercel.app/api

# SPA (React Router). Also see public/_redirects (copied into dist).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true
