[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Required — also set in Netlify UI → Environment variables, then redeploy:
  VITE_API_URL = "https://coaching-backend-bm5g.onrender.com/api"

# SPA (React Router). Also see public/_redirects (copied into dist).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true
