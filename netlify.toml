# Use this file when the Netlify site root is the Git repo root (no "Base directory" set).
# If Base directory = "frontend", Netlify uses frontend/netlify.toml instead.

[build]
  command = "cd frontend && npm ci && npm run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "https://coaching-backend-bm5g.onrender.com/api"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true
